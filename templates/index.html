{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TradingAgent — AI-Powered Strategy Backtesting</title>

  <!-- TailwindCSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#0a0a0f',
            card: '#12121a',
            border: '#1e1e2e',
            indigo: { DEFAULT: '#6366f1', dark: '#4f46e5' },
            emerald: { DEFAULT: '#10b981' },
            danger: '#ef4444',
            amber: '#f59e0b',
          },
          fontFamily: { sans: ['system-ui', 'sans-serif'] },
        }
      }
    }
  </script>

  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- chartjs-plugin-zoom — only wired up by the Lab module's chart components -->
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>

  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- highlight.js CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #0a0a0f;
      color: #e2e8f0;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }

    :root {
      --bg: #0a0a0f;
      --card: #12121a;
      --border: #1e1e2e;
      --indigo: #6366f1;
      --emerald: #10b981;
      --danger: #ef4444;
      --amber: #f59e0b;
      --text-primary: #e2e8f0;
      --text-muted: #64748b;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--card); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #2d2d44; }

    /* Page transitions */
    .page-enter {
      animation: pageEnter 0.25s ease forwards;
    }
    @keyframes pageEnter {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Skeleton shimmer */
    .skeleton {
      background: linear-gradient(90deg, var(--card) 25%, #1a1a28 50%, var(--card) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Card base */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    /* Status badges */
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 10px; border-radius: 999px; font-size: 12px; font-weight: 500;
    }
    .badge-pending  { background: rgba(100,116,139,.15); color: #94a3b8; }
    .badge-generating { background: rgba(99,102,241,.15); color: #818cf8; }
    .badge-generated  { background: rgba(16,185,129,.15); color: #34d399; }
    .badge-failed     { background: rgba(239,68,68,.15);  color: #f87171; }
    .badge-needs_review { background: rgba(245,158,11,.15); color: #fbbf24; }
    .badge-queued   { background: rgba(100,116,139,.15); color: #94a3b8; }
    .badge-running  { background: rgba(99,102,241,.15); color: #818cf8; }
    .badge-completed { background: rgba(16,185,129,.15); color: #34d399; }

    /* Spinner */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(99,102,241,.3);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
      flex-shrink: 0;
    }
    .spinner-lg {
      width: 36px; height: 36px;
      border-width: 3px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Navbar */
    #navbar {
      position: sticky; top: 0; z-index: 50;
      background: rgba(10,10,15,.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    /* Tabs */
    .tab-btn {
      padding: 8px 20px; border-radius: 8px; font-size: 14px;
      color: var(--text-muted); cursor: pointer; transition: all .2s;
      background: transparent; border: none;
    }
    .tab-btn:hover { color: var(--text-primary); background: rgba(255,255,255,.04); }
    .tab-btn.active { color: #fff; background: var(--indigo); }

    /* Filter pills */
    .filter-pill {
      padding: 5px 14px; border-radius: 999px; font-size: 13px;
      border: 1px solid var(--border); cursor: pointer; transition: all .15s;
      color: var(--text-muted); background: transparent;
    }
    .filter-pill:hover { border-color: var(--indigo); color: var(--text-primary); }
    .filter-pill.active { background: var(--indigo); border-color: var(--indigo); color: #fff; }

    /* Progress steps */
    .step-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; border-radius: 8px;
      transition: background .2s;
    }
    .step-item.done  { background: rgba(16,185,129,.07); }
    .step-item.active{ background: rgba(99,102,241,.07); }

    /* Toast container */
    #toast-container {
      position: fixed; bottom: 24px; right: 24px;
      z-index: 9999; display: flex; flex-direction: column; gap: 10px;
      pointer-events: none;
    }

    /* highlight.js overrides */
    .hljs { background: #0d0d17 !important; border-radius: 8px; padding: 1.25rem !important; font-size: 13px; }

    /* Table */
    .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .data-table th {
      text-align: left; padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      color: var(--text-muted); font-weight: 500;
      white-space: nowrap;
    }
    .data-table td {
      padding: 10px 14px;
      border-bottom: 1px solid rgba(30,30,46,.6);
    }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr.win td { background: rgba(16,185,129,.04); }
    .data-table tr.loss td { background: rgba(239,68,68,.04); }

    /* Metric card */
    .metric-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }

    /* Indeterminate progress bar */
    .progress-bar-wrap {
      height: 4px; background: rgba(99,102,241,.15); border-radius: 2px; overflow: hidden;
    }
    .progress-bar-indeterminate {
      height: 100%; width: 40%; background: var(--indigo); border-radius: 2px;
      animation: progressSlide 1.5s ease-in-out infinite;
    }
    @keyframes progressSlide {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }

    /* Symbol tag input */
    .tag {
      display: inline-flex; align-items: center; gap: 4px;
      background: rgba(99,102,241,.15); color: #818cf8;
      border-radius: 999px; padding: 2px 10px; font-size: 13px;
    }
    .tag button { background: none; border: none; color: inherit; cursor: pointer; padding: 0 2px; line-height: 1; }

    /* Input base */
    .input-base {
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      padding: 10px 14px;
      font-size: 14px;
      width: 100%;
      outline: none;
      transition: border-color .2s;
    }
    .input-base:focus { border-color: var(--indigo); }
    .input-base::placeholder { color: var(--text-muted); }

    /* <select> dropdown popups render with the browser's native (usually white)
       background regardless of .input-base's own styling — <option> needs its
       own explicit colors or the open list is unreadable against the dark theme. */
    select.input-base option {
      background: var(--card);
      color: var(--text-primary);
    }
    select.input-base optgroup {
      background: var(--card);
      color: var(--text-muted);
      font-weight: 600;
      font-style: normal;
    }

    /* Button base */
    .btn-primary {
      background: var(--indigo); color: #fff; border: none;
      border-radius: 8px; padding: 10px 20px; font-size: 14px; font-weight: 500;
      cursor: pointer; transition: opacity .2s; display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-secondary {
      background: rgba(255,255,255,.06); color: var(--text-primary); border: 1px solid var(--border);
      border-radius: 8px; padding: 9px 18px; font-size: 14px;
      cursor: pointer; transition: background .2s; display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-secondary:hover { background: rgba(255,255,255,.1); }

    /* Gradient text */
    .gradient-text {
      background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Entry/exit rule cards */
    .rule-card-entry { border-left: 3px solid var(--emerald); }
    .rule-card-exit  { border-left: 3px solid var(--danger); }

    /* Equity baseline */
    .chart-container { position: relative; width: 100%; }
  </style>
</head>
<body>

<!-- Navbar -->
<nav id="navbar">
  <div class="max-w-7xl mx-auto px-6 h-14 flex items-center justify-between">
    <a data-link href="/" class="flex items-center gap-2 no-underline">
      <div style="width:28px;height:28px;background:var(--indigo);border-radius:7px;display:flex;align-items:center;justify-content:center;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      </div>
      <span style="font-weight:700;font-size:16px;color:#fff;">TradingAgent</span>
    </a>
    <div class="flex items-center gap-1">
      <a data-link href="/" class="nav-link px-3 py-1.5 rounded-lg text-sm" style="color:var(--text-muted);text-decoration:none;transition:color .2s;">Dashboard</a>
      <a data-link href="/strategies" class="nav-link px-3 py-1.5 rounded-lg text-sm" style="color:var(--text-muted);text-decoration:none;transition:color .2s;">Strategies</a>
      <a data-link href="/backtests" class="nav-link px-3 py-1.5 rounded-lg text-sm" style="color:var(--text-muted);text-decoration:none;transition:color .2s;">Backtests</a>
      <a data-link href="/lab" class="nav-link px-3 py-1.5 rounded-lg text-sm" style="color:var(--text-muted);text-decoration:none;transition:color .2s;">Lab</a>
      <a data-link href="/screener" class="nav-link px-3 py-1.5 rounded-lg text-sm" style="color:var(--text-muted);text-decoration:none;transition:color .2s;">Screener</a>
      <a data-link href="/settings" class="nav-link px-3 py-1.5 rounded-lg text-sm" style="color:var(--text-muted);text-decoration:none;transition:color .2s;">Settings</a>
      <a data-link href="/strategies/new" class="btn-primary ml-2" style="padding:7px 14px;font-size:13px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Strategy

    </div>
  </div>
</nav>

<!-- Toast container -->

</body>
</html>
